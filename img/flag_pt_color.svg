<?xml version="1.0" encoding="UTF-8"?>
<svg viewBox="0 0 600 400" width="600" height="400" xmlns="http://www.w3.org/2000/svg">
  <!-- Portuguese flag -->
  <rect width="600" height="400" fill="#DA291C"/>
  <rect width="240" height="400" fill="#006600"/>
  <!-- Armillary sphere base -->
  <circle cx="240" cy="200" r="70" fill="#FFCC00"/>
  <circle cx="240" cy="200" r="58" fill="none" stroke="#806000" stroke-width="2"/>
  <!-- Shield -->
  <path d="M215 168h50v48c0 12-25 20-25 20s-25-8-25-20z" fill="#fff"/>
  <path d="M215 168h50v48c0 12-25 20-25 20s-25-8-25-20z" fill="none" stroke="#DA291C" stroke-width="3"/>
  <!-- Blue cross on shield -->
  <line x1="240" y1="172" x2="240" y2="218" stroke="#003399" stroke-width="6"/>
  <line x1="218" y1="194" x2="262" y2="194" stroke="#003399" stroke-width="6"/>
  <!-- Five blue quinas -->
  <circle cx="240" cy="182" r="4" fill="#003399"/>
  <circle cx="228" cy="194" r="4" fill="#003399"/>
  <circle cx="252" cy="194" r="4" fill="#003399"/>
  <circle cx="232" cy="207" r="4" fill="#003399"/>
  <circle cx="248" cy="207" r="4" fill="#003399"/>
  <!-- Armillary bands -->
  <ellipse cx="240" cy="200" rx="68" ry="42" fill="none" stroke="#FFCC00" stroke-width="3"/>
  <ellipse cx="240" cy="200" rx="42" ry="68" fill="none" stroke="#FFCC00" stroke-width="3" transform="rotate(25,240,200)"/>
  <ellipse cx="240" cy="200" rx="42" ry="68" fill="none" stroke="#FFCC00" stroke-width="3" transform="rotate(-25,240,200)"/>
</svg>
